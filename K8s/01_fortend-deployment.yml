apiVersion: apps/v1
kind: Deployment
metadata:
  name: fortend-dep
  namespace: marketmandu-ns

spec:
  replicas: 2
  selector:
    matchLabels:
      app: fortend-dep
  template:
    metadata:
      labels:
        app: fortend-dep
    spec:
      containers:
      - name: fortend-dep-container
        image: sarojdockerworkspace/marketmandu-fortend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
        limits:
          memory: "300Mi"
          cpu: "250m"